<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Nav Pills -->
  <nav id="nav-bar">
    <button class="nav-pill focusable active" data-page="home">Home</button>
    <button class="nav-pill focusable" data-page="library">Library</button>
    <button class="nav-pill focusable" data-page="settings">Settings</button>
  </nav>

  <!-- Coming Soon Overlay -->
  <div id="coming-soon" class="hidden">
    <span>Coming Soon</span>
  </div>

  <!-- Hero Section -->
  <section id="hero">
    <div id="hero-backdrop"></div>
    <div id="hero-gradient"></div>
    <div id="hero-content">
      <h1 id="hero-title"></h1>
      <p id="hero-overview"></p>
    </div>
  </section>

  <!-- Content Rows -->
  <section id="content">
    <div class="row" data-row-id="trending">
      <h2 class="row-title">Trending</h2>
      <div class="row-scroll"></div>
    </div>
    <div class="row" data-row-id="popular">
      <h2 class="row-title">Popular</h2>
      <div class="row-scroll"></div>
    </div>
    <div class="row" data-row-id="top_rated">
      <h2 class="row-title">Top Rated</h2>
      <div class="row-scroll"></div>
    </div>
    <div class="row" data-row-id="now_playing">
      <h2 class="row-title">Now Playing</h2>
      <div class="row-scroll"></div>
    </div>
    <div class="row" data-row-id="upcoming">
      <h2 class="row-title">Upcoming</h2>
      <div class="row-scroll"></div>
    </div>
    <div class="row" data-row-id="popular_tv">
      <h2 class="row-title">Popular Series</h2>
      <div class="row-scroll"></div>
    </div>
    <div class="row" data-row-id="latest_tv">
      <h2 class="row-title">Latest Series</h2>
      <div class="row-scroll"></div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
