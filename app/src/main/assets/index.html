<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Nav Pills -->
  <nav id="nav-bar">
    <button class="nav-pill focusable active" data-page="home">Home</button>
    <button class="nav-pill focusable" data-page="library">Library</button>
    <button class="nav-pill focusable" data-page="settings">Settings</button>
    <div id="library-status" class="nav-pill nav-status hidden" role="status" aria-live="polite"></div>
  </nav>

  <!-- Coming Soon Overlay -->
  <div id="coming-soon" class="hidden">
    <span>Coming Soon</span>
  </div>

  <!-- Settings Section -->
  <section id="settings-page" class="hidden">
    <div id="settings-list">
      <div class="settings-item focusable" id="settings-update" tabindex="-1">
        <div class="settings-item-left">
          <div class="settings-item-title">Update App</div>
          <div class="settings-item-desc">Download and install the latest version</div>
        </div>
        <button class="settings-action-btn" id="settings-update-btn">Download Update</button>
      </div>
    </div>
  </section>

  <!-- Hero Section -->
  <section id="hero">
    <div id="hero-backdrop"></div>
    <div id="hero-gradient"></div>
    <div id="hero-content">
      <h1 id="hero-title"></h1>
      <div id="hero-meta"></div>
      <p id="hero-overview"></p>
    </div>
  </section>

  <!-- Content Rows -->
  <section id="content">
    <div class="row" data-row-id="trending">
      <h2 class="row-title">Trending Movies</h2>
      <div class="row-scroll"></div>
    </div>
    <div class="row" data-row-id="popular">
      <h2 class="row-title">Popular Movies</h2>
      <div class="row-scroll"></div>
    </div>
  </section>

  <!-- Library Section -->
  <section id="library" class="hidden" aria-label="Library">
    <div id="library-list" role="list"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
